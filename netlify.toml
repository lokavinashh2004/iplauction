# ─── Redirects ───────────────────────────────────────────────────────────────
# Serve index.html for all routes (React SPA)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Cache Headers ───────────────────────────────────────────────────────────

# 1. index.html — always revalidate so users pick up new deploys immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# 2. version.json — same: must never be served stale
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# 3. Hashed JS/CSS bundles — safe to cache for 1 year because the filename
#    changes on every build, so stale content is impossible
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 4. Static images / fonts — 1 week with revalidation (no content hash)
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
